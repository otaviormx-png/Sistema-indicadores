# ============================================================
# APS Suite — configuração central
# Edite este arquivo para ajustar comportamento sem mexer no código.
# ============================================================

[caminhos]
# Pasta padrão de entrada (onde ficam os arquivos brutos do e-SUS).
# Use string vazia "" para usar o Desktop do usuário atual.
entrada_padrao = ""

# Pasta padrão de saída (onde os resultados serão salvos).
# Use string vazia "" para usar APS_RESULTADOS no Desktop.
saida_padrao = ""

[processamento]
# Marcadores que fazem um arquivo ser IGNORADO na listagem de brutos.
# Arquivos cujo nome contenha qualquer um destes termos serão pulados.
ignorar_marcadores = [
    "resultado",
    "aps_resultados",
    "busca ativa",
    "estatisticas",
    "estatísticas",
    "resumo",
    "_interativa",
    "comparativo",
    "dashboard",
]

[interface]
# Define true para usar CustomTkinter (interface moderna com dark mode).
# Requer instalação prévia:  pip install customtkinter
# Ou defina a variável de ambiente APS_TEMA_MODERNO=1
tema_moderno = false
